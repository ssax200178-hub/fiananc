<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الادارة المالية</title>
  <!-- SheetJS for Excel Parsing -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;700;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Noto Sans Arabic', 'Inter', sans-serif;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.2);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.4);
    }

    .shimmer {
      background: linear-gradient(to right, #1e293b 8%, #334155 18%, #1e293b 33%);
      background-size: 800px 104px;
      animation: shimmer 2s linear infinite forwards;
    }

    @keyframes shimmer {
      0% {
        background-position: -800px 0;
      }

      100% {
        background-position: 800px 0;
      }
    }

    /* =========================================
       CRITICAL PRINT ISOLATION
       Injected directly into HTML to override
       all Tailwind and external CSS rules.
       ========================================= */
    @media print {

      /* 1. Hide the main React root completely */
      #root {
        display: none !important;
      }

      /* 2. Show the Portal root and let it flow */
      #print-root {
        display: block !important;
        position: relative !important;
        width: 100% !important;
        height: auto !important;
        min-height: 100% !important;
        background: white !important;
        visibility: visible !important;
        z-index: 999999 !important;
        overflow: visible !important;
      }

      /* 3. Reset document height limits */
      html,
      body {
        height: auto !important;
        min-height: 100% !important;
        overflow: visible !important;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        display: block !important;
      }

      /* 4. Global Page Settings */
      @page {
        size: A4;
        margin: 0;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>

</head>

<body class="font-body selection:bg-primary-blue selection:text-white">
  <div id="print-root"></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
